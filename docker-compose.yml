services:
  animedb:
    image: ghcr.io/enrell/animedb-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - animedb-data:/data
    environment:
      ANIMEDB_DATABASE_PATH: /data/animedb.sqlite
      ANIMEDB_LISTEN_ADDR: 0.0.0.0:8080
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  animedb-data: