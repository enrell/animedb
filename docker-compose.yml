services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d postgres://root:root@localhost:5432/root"]
      interval: 5s
      timeout: 5s
      retries: 20

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/app/scripts/docker-seed.sh"]
    environment:
      ADMIN_DSN: postgres://root:root@postgres:5432/root?sslmode=disable
      ANILIST_DB: anilist
      MYANIMELIST_DB: myanimelist
      VIDEOS_DB: videos
      ANILIST_SORT: ID
      ENABLE_ANILIST_SEED: "true"
      ENABLE_MYANIMELIST_SEED: "false"
      FORCE_SEED: "false"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - go
      - run
      - ./cmd/api
      - --listen
      - :8081
      - --admin-dsn
      - postgres://root:root@postgres:5432/root?sslmode=disable
      - --anilist-dsn
      - postgres://root:root@postgres:5432/anilist?sslmode=disable
      - --myanimelist-dsn
      - postgres://root:root@postgres:5432/myanimelist?sslmode=disable
      - --videos-dsn
      - postgres://root:root@postgres:5432/videos?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    restart: unless-stopped
    ports:
      - "8081:8081"

volumes:
  postgres_data:
